document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

flex; align-items:center; gap:14px; margin-bottom:22px;\">\n      <span style=\"width:42px; height:1px; background:{{ accent }};\"><\u002Fspan>\n      <span style=\"font-family:'Cormorant Garamond',serif; font-size:13px; letter-spacing:0.34em; text-transform:uppercase; color:{{ accent }};\">Roadmap de Automatización<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex; flex-wrap:wrap; justify-content:space-between; align-items:flex-end; gap:32px;\">\n      <div style=\"max-width:680px;\">\n        <h1 style=\"font-family:'Playfair Display',serif; font-weight:500; font-size:clamp(36px,5vw,58px); line-height:1.05; letter-spacing:-0.01em; color:#fbf5ec;\">Prioridades de<br><span style=\"font-style:italic; color:{{ accent }};\">automatización<\u002Fspan><\u002Fh1>\n        <p style=\"font-family:'Cormorant Garamond',serif; font-size:20px; line-height:1.6; color:#bcae9c; margin-top:18px; max-width:540px;\">Once iniciativas ordenadas por impacto y esfuerzo, agrupadas en tres fases que se construyen una sobre otra: primero la base de datos, luego los procesos, al final la difusión.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:10px; flex-shrink:0;\">\n        <div style=\"min-width:104px; padding:16px 18px; background:rgba(255,255,255,0.025); border:1px solid rgba(200,165,90,0.16); border-radius:14px;\">\n          <div style=\"font-family:'Playfair Display',serif; font-size:32px; color:#fbf5ec; line-height:1;\">11<\u002Fdiv>\n          <div style=\"font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:#8c8071; margin-top:6px;\">Tareas<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"min-width:104px; padding:16px 18px; background:rgba(223,91,91,0.07); border:1px solid rgba(223,91,91,0.22); border-radius:14px;\">\n          <div style=\"font-family:'Playfair Display',serif; font-size:32px; color:#ef9b9a; line-height:1;\">3<\u002Fdiv>\n          <div style=\"font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:#c08a86; margin-top:6px;\">Críticas<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"min-width:104px; padding:16px 18px; background:rgba(177,168,239,0.06); border:1px solid rgba(177,168,239,0.2); border-radius:14px;\">\n          <div style=\"font-family:'Playfair Display',serif; font-size:32px; color:#b9b0f2; line-height:1;\">5<\u002Fdiv>\n          <div style=\"font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:#9990bd; margin-top:6px;\">Quick wins<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- PHASE FLOW -->\n  <div style=\"max-width:1240px; margin:0 auto 30px; display:flex; align-items:stretch; gap:0; flex-wrap:wrap; animation:rmFade 0.7s 0.05s ease both;\">\n    <sc-for list=\"{{ flow }}\" as=\"step\" hint-placeholder-count=\"3\">\n      <div style=\"flex:1 1 220px; display:flex; align-items:center; gap:14px; padding:16px 20px; background:rgba(255,255,255,0.02); border:1px solid rgba(200,165,90,0.12); border-left:3px solid {{ step.color }}; border-radius:12px; margin-right:10px; min-width:200px;\">\n        <span style=\"font-family:'Playfair Display',serif; font-size:26px; color:{{ step.color }}; opacity:0.85;\">{{ step.num }}<\u002Fspan>\n        <div>\n          <div style=\"font-size:14px; font-weight:600; color:#f1e9dd;\">{{ step.name }}<\u002Fdiv>\n          <div style=\"font-size:12px; color:#8c8071; margin-top:2px;\">{{ step.tagline }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <!-- FILTER BAR -->\n  <div style=\"position:sticky; top:0; z-index:20; max-width:1240px; margin:0 auto 38px; padding:16px 18px; background:rgba(26,21,15,0.86); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); border:1px solid rgba(200,165,90,0.14); border-radius:16px;\">\n    <div style=\"display:flex; flex-wrap:wrap; align-items:center; gap:18px 26px;\">\n      <div style=\"display:flex; align-items:center; gap:10px; flex-wrap:wrap;\">\n        <span style=\"font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:#8c8071; margin-right:2px;\">Prioridad<\u002Fspan>\n        <sc-for list=\"{{ priorityChips }}\" as=\"chip\" hint-placeholder-count=\"4\">\n          <button onclick=\"{{ chip.onClick }}\" style=\"{{ chip.style }}\">\n            <span style=\"width:8px; height:8px; border-radius:50%; background:{{ chip.dot }};\"><\u002Fspan>{{ chip.label }}\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:10px; flex-wrap:wrap;\">\n        <span style=\"font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:#8c8071; margin-right:2px;\">Esfuerzo<\u002Fspan>\n        <sc-for list=\"{{ effortChips }}\" as=\"chip\" hint-placeholder-count=\"3\">\n          <button onclick=\"{{ chip.onClick }}\" style=\"{{ chip.style }}\">{{ chip.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"margin-left:auto; display:flex; align-items:center; gap:14px;\">\n        <span style=\"font-size:13px; color:#bcae9c;\">{{ shownLabel }}<\u002Fspan>\n        <button onclick=\"{{ clearFilters }}\" style=\"{{ clearStyle }}\">Limpiar<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- PHASES -->\n  <main style=\"max-width:1240px; margin:0 auto; display:flex; flex-direction:column; gap:48px;\">\n    <sc-for list=\"{{ phases }}\" as=\"phase\" hint-placeholder-count=\"3\">\n      <section>\n        <div style=\"display:flex; align-items:baseline; gap:16px; padding-bottom:18px; margin-bottom:24px; border-bottom:1px solid rgba(200,165,90,0.13);\">\n          <span style=\"font-family:'Playfair Display',serif; font-size:40px; color:{{ phase.color }}; line-height:1;\">{{ phase.num }}<\u002Fspan>\n          <div style=\"flex:1;\">\n            <h2 style=\"font-family:'Playfair Display',serif; font-size:26px; font-weight:600; color:#fbf5ec;\">{{ phase.name }}<\u002Fh2>\n            <p style=\"font-size:13px; color:#8c8071; margin-top:3px;\">{{ phase.tagline }}<\u002Fp>\n          <\u002Fdiv>\n          <span style=\"font-size:12px; color:#8c8071; white-space:nowrap;\">{{ phase.countLabel }}<\u002Fspan>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ phase.empty }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"padding:34px; text-align:center; color:#6f6657; font-size:14px; border:1px dashed rgba(200,165,90,0.16); border-radius:14px;\">Sin tareas que coincidan con los filtros.<\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:18px;\">\n          <sc-for list=\"{{ phase.items }}\" as=\"item\" hint-placeholder-count=\"3\">\n            <article style=\"display:flex; flex-direction:column; gap:13px; padding:22px; background:linear-gradient(180deg, rgba(255,255,255,0.034), rgba(255,255,255,0.012)); border:1px solid {{ item.cardBorder }}; border-radius:16px; transition:transform 0.18s ease, border-color 0.18s ease;\" style-hover=\"transform:translateY(-3px); border-color:rgba(200,165,90,0.4);\">\n              <div style=\"display:flex; justify-content:space-between; align-items:flex-start; gap:12px;\">\n                <span style=\"font-family:'Playfair Display',serif; font-size:15px; color:#7d7263; border:1px solid rgba(200,165,90,0.2); border-radius:8px; padding:3px 9px; min-width:34px; text-align:center;\">{{ item.n }}<\u002Fspan>\n                <span style=\"{{ item.prioStyle }}\"><span style=\"width:8px; height:8px; border-radius:50%; background:{{ item.prioDot }};\"><\u002Fspan>{{ item.prioLabel }}<\u002Fspan>\n              <\u002Fdiv>\n              <h3 style=\"font-size:16px; font-weight:600; color:#fbf5ec; line-height:1.3;\">{{ item.name }}<\u002Fh3>\n              <p style=\"font-size:13px; line-height:1.6; color:#a99d8c;\">{{ item.desc }}<\u002Fp>\n              <div style=\"display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-top:2px;\">\n                <span style=\"{{ item.effortStyle }}\">Esfuerzo {{ item.effortLabel }}<\u002Fspan>\n                <sc-if value=\"{{ showImpact }}\" hint-placeholder-val=\"{{ true }}\">\n                  <span style=\"{{ item.impactStyle }}\">Impacto {{ item.impact }}<\u002Fspan>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n              <div style=\"display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; padding-top:13px; border-top:1px solid rgba(200,165,90,0.1);\">\n                <sc-for list=\"{{ item.tags }}\" as=\"tag\" hint-placeholder-count=\"3\">\n                  <span style=\"font-size:11px; color:#988c7b; background:rgba(255,255,255,0.04); border:1px solid rgba(200,165,90,0.12); border-radius:6px; padding:3px 9px;\">{{ tag }}<\u002Fspan>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Farticle>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fsc-for>\n  <\u002Fmain>\n\n  <footer style=\"max-width:1240px; margin:64px auto 0; padding-top:22px; border-top:1px solid rgba(200,165,90,0.12); display:flex; justify-content:space-between; flex-wrap:wrap; gap:12px; font-size:12px; color:#6f6657;\">\n    <span>Infraestructura → Automatizaciones → Visibilidad<\u002Fspan>\n    <span>Cada fase habilita la siguiente<\u002Fspan>\n  <\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#c8a55a&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;showImpact&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  state = { priorities: [], efforts: [] };\n\n  data() {\n    const accent = this.props.accent ?? '#c8a55a';\n    const PRIO = {\n      p1: { label: 'Crítico', dot: '#df5b5b', bg: 'rgba(223,91,91,0.13)', bd: 'rgba(223,91,91,0.34)', fg: '#ef9b9a' },\n      p2: { label: 'Alto',    dot: '#e0a155', bg: 'rgba(224,161,85,0.13)', bd: 'rgba(224,161,85,0.32)', fg: '#e8bd82' },\n      p3: { label: 'Medio',   dot: '#d8c25a', bg: 'rgba(216,194,90,0.13)', bd: 'rgba(216,194,90,0.3)',  fg: '#ddcd84' },\n      p4: { label: 'Bajo',    dot: '#74c08a', bg: 'rgba(116,192,138,0.13)', bd: 'rgba(116,192,138,0.3)', fg: '#9bd0aa' },\n    };\n    const EFF = {\n      low:  { label: 'Bajo',  bg: 'rgba(149,138,234,0.14)', fg: '#b6adf0' },\n      med:  { label: 'Medio', bg: 'rgba(96,154,212,0.15)',  fg: '#92bfe8' },\n      high: { label: 'Alto',  bg: 'rgba(220,118,162,0.15)', fg: '#e6a0c0' },\n    };\n    const ITEMS = [\n      { n: 1,  p: 'p1', ef: 'low',  impact: 'Muy alto', name: 'Migrar Sheets → SQL', desc: 'Fundación de todo el ecosistema. Sin DB estructurada el resto de automatizaciones quedan en el aire.', tags: ['Supabase', 'Python', 'Drive API'] },\n      { n: 4,  p: 'p1', ef: 'low',  impact: 'Alto',     name: 'Limpiar DB de correos', desc: 'Filtrar dominios ≠ Gmail y corregir errores de digitación. Base sana antes de cualquier automatización.', tags: ['Python', 'regex', 'Sheets API'] },\n      { n: 11, p: 'p1', ef: 'low',  impact: 'Alto',     name: 'Script encriptamiento datos IA', desc: 'Permite usar IA con datos reales sin exponer info confidencial. Habilita muchos casos siguientes.', tags: ['Python', 'cryptography', 'Sheets API'] },\n      { n: 3,  p: 'p2', ef: 'med',  impact: 'Alto',     name: 'Automatizar oportunidades → DB mujeres ROFE', desc: 'Cuando vence el tiempo de la info, mover registro automáticamente a la DB destino.', tags: ['Supabase', 'cron / triggers'] },\n      { n: 5,  p: 'p2', ef: 'med',  impact: 'Alto',     name: 'Mejora de formularios y feedback', desc: 'Rediseñar preguntas para capturar datos más accionables y ayuda a entender el punto 6.', tags: ['Google Forms', 'análisis UX'] },\n      { n: 6,  p: 'p2', ef: 'high', impact: 'Muy alto', name: 'Estudio por qué no se unen al siguiente curso', desc: 'Mapear patrones de deserción. Requiere llamadas + análisis; se nutre de los nuevos datos del form.', tags: ['CRM', 'entrevistas', 'análisis cualitativo'] },\n      { n: 2,  p: 'p2', ef: 'med',  impact: 'Medio',    name: 'Automatización de Zoom', desc: 'Aplica tanto al flujo general de reuniones como a la apertura automática de salas (punto 10).', tags: ['Zoom API', 'cron', 'Zapier/n8n'] },\n      { n: 10, p: 'p3', ef: 'low',  impact: 'Medio',    name: 'Apertura automática sala Zoom (panel mujeres)', desc: 'Sala se abre 15 min antes del schedule. Se puede resolver junto con el punto 2.', tags: ['Zoom API', 'scheduler'] },\n      { n: 9,  p: 'p3', ef: 'med',  impact: 'Medio',    name: 'Publicar datos Sheets → website', desc: 'Sincronización automática entre la hoja y el sitio oficial. Depende de la migración a SQL.', tags: ['API REST', 'CMS / webhook'] },\n      { n: 7,  p: 'p3', ef: 'high', impact: 'Medio',    name: 'Zoom → YouTube → Website automático', desc: 'Pipeline: grabación → subida a YT → link al sitio oficial. Requiere OAuth de YT y permisos correctos.', tags: ['YouTube Data API', 'Zoom webhooks', 'n8n'] },\n      { n: 8,  p: 'p4', ef: 'low',  impact: 'Bajo',     name: 'Publicar panel de novedades automático', desc: 'Imagen pequeña generada (Canva/IA) y publicada en los canales. Rápido de implementar.', tags: ['Canva API', 'DALL-E / Flux', 'scheduler'] },\n    ];\n    const PHASES = [\n      { id: 'infra', num: '01', name: 'Infraestructura', tagline: 'La base de datos sobre la que se apoya todo', color: '#df5b5b', nums: [1, 4, 11] },\n      { id: 'auto',  num: '02', name: 'Automatizaciones', tagline: 'Procesos que empiezan a correr solos', color: accent, nums: [3, 5, 6, 2] },\n      { id: 'vis',   num: '03', name: 'Visibilidad', tagline: 'Publicación y difusión hacia afuera', color: '#74c08a', nums: [10, 9, 7, 8] },\n    ];\n    return { accent, PRIO, EFF, ITEMS, PHASES };\n  }\n\n  toggle(group, key) {\n    this.setState(s => {\n      const set = new Set(s[group]);\n      set.has(key) ? set.delete(key) : set.add(key);\n      return { [group]: [...set] };\n    });\n  }\n\n  matches(it) {\n    const { priorities, efforts } = this.state;\n    const pOk = priorities.length === 0 || priorities.includes(it.p);\n    const eOk = efforts.length === 0 || efforts.includes(it.ef);\n    return pOk && eOk;\n  }\n\n  renderVals() {\n    const { accent, PRIO, EFF, ITEMS, PHASES } = this.data();\n    const { priorities, efforts } = this.state;\n    const showImpact = this.props.showImpact ?? true;\n\n    const impactStyle = (imp) => {\n      const strong = imp === 'Muy alto';\n      return `display:inline-flex; align-items:center; font-size:12px; font-weight:500; padding:4px 11px; border-radius:7px; color:${strong ? accent : '#9c9080'}; background:${strong ? 'rgba(200,165,90,0.12)' : 'rgba(255,255,255,0.04)'}; border:1px solid ${strong ? 'rgba(200,165,90,0.3)' : 'rgba(200,165,90,0.12)'};`;\n    };\n\n    const phases = PHASES.map(ph => {\n      const items = ph.nums\n        .map(n => ITEMS.find(i => i.n === n))\n        .filter(it => this.matches(it))\n        .map(it => {\n          const pr = PRIO[it.p], ef = EFF[it.ef];\n          return {\n            n: it.n, name: it.name, desc: it.desc, impact: it.impact, tags: it.tags,\n            prioLabel: pr.label, prioDot: pr.dot,\n            prioStyle: `display:inline-flex; align-items:center; gap:7px; font-size:12px; font-weight:600; padding:4px 11px; border-radius:20px; color:${pr.fg}; background:${pr.bg}; border:1px solid ${pr.bd}; white-space:nowrap;`,\n            cardBorder: `${pr.bd.replace(/0\\.\\d+\\)/, '0.16)')}`,\n            effortLabel: ef.label,\n            effortStyle: `display:inline-flex; align-items:center; font-size:12px; font-weight:500; padding:4px 11px; border-radius:7px; color:${ef.fg}; background:${ef.bg}; border:1px solid ${ef.bg.replace('0.1', '0.2')};`,\n            impactStyle: impactStyle(it.impact),\n          };\n        });\n      const total = ph.nums.length;\n      return {\n        num: ph.num, name: ph.name, tagline: ph.tagline, color: ph.color,\n        items, empty: items.length === 0,\n        countLabel: items.length === total ? `${total} tareas` : `${items.length} / ${total} tareas`,\n      };\n    });\n\n    const chipBase = (active, activeBg, activeBd, activeFg) =>\n      `display:inline-flex; align-items:center; gap:7px; font-family:'Inter',sans-serif; font-size:13px; font-weight:500; padding:6px 13px; border-radius:20px; cursor:pointer; transition:all 0.15s ease; background:${active ? activeBg : 'rgba(255,255,255,0.03)'}; border:1px solid ${active ? activeBd : 'rgba(200,165,90,0.16)'}; color:${active ? activeFg : '#9c9080'};`;\n\n    const priorityChips = ['p1', 'p2', 'p3', 'p4'].map(k => {\n      const pr = PRIO[k], active = priorities.includes(k);\n      return { label: pr.label, dot: pr.dot, onClick: () => this.toggle('priorities', k),\n        style: chipBase(active, pr.bg, pr.bd, pr.fg) };\n    });\n\n    const effortChips = ['low', 'med', 'high'].map(k => {\n      const ef = EFF[k], active = efforts.includes(k);\n      return { label: ef.label, onClick: () => this.toggle('efforts', k),\n        style: chipBase(active, ef.bg, ef.bg.replace('0.1', '0.3'), ef.fg) };\n    });\n\n    const shown = ITEMS.filter(it => this.matches(it)).length;\n    const hasFilter = priorities.length > 0 || efforts.length > 0;\n\n    const flow = PHASES.map(ph => ({ num: ph.num, name: ph.name, tagline: ph.tagline, color: ph.color }));\n\n    return {\n      accent, showImpact, phases, priorityChips, effortChips, flow,\n      shownLabel: hasFilter ? `Mostrando ${shown} de 11` : 'Mostrando las 11 tareas',\n      clearFilters: () => this.setState({ priorities: [], efforts: [] }),\n      clearStyle: `font-family:'Inter',sans-serif; font-size:12px; font-weight:500; padding:6px 14px; border-radius:20px; cursor:${hasFilter ? 'pointer' : 'default'}; background:transparent; border:1px solid rgba(200,165,90,${hasFilter ? '0.3' : '0.12'}); color:${hasFilter ? accent : '#6f6657'}; transition:all 0.15s ease; opacity:${hasFilter ? '1' : '0.5'};`,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
